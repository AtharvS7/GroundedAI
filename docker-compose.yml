version: '3.9'

networks:
  groundedai:
    driver: bridge

volumes:
  faiss_data:
  ollama_data:
  redis_data:

services:
  backend:
    build: ./backend
    container_name: groundedai-backend
    ports:
      - "8000:8000"
    volumes:
      - faiss_data:/app/data/faiss_index
    env_file: .env
    depends_on:
      - redis
      - ollama
    networks:
      - groundedai
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: groundedai-frontend
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.local
    networks:
      - groundedai
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: groundedai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - groundedai
    restart: unless-stopped
    command: redis-server --appendonly yes

  ollama:
    image: ollama/ollama:latest
    container_name: groundedai-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - groundedai
    restart: unless-stopped
